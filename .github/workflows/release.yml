name: release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # UI build
      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.8
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:ui

      # Go build (cross-compiles for all targets from the same runner because
      # the codebase is pure-Go: 99designs/keyring uses os/exec on macOS and
      # godbus on Linux — no cgo, no platform-specific toolchains needed.)
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build platform binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X main.version=${VERSION}"

          for target in darwin-arm64 darwin-amd64 linux-amd64 linux-arm64 windows-amd64; do
            os="${target%-*}"
            arch="${target#*-}"
            ext=""
            [ "$os" = "windows" ] && ext=".exe"
            out="dist/solsclaw-${target}${ext}"
            echo "→ $out"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
              go build -trimpath -ldflags="$LDFLAGS" -o "$out" ./cmd/solsclaw
            sha256sum "$out" | awk '{print $1}' > "$out.sha256"
          done

          ls -lh dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
